<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocos Creator Easing Cheat Sheet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', Courier, monospace;
  background: #f0f2f4;
  color: #1a1a1a;
  padding-bottom: 60px;
}

/* ── 標題列 ── */
.header {
  background: #1a5fcf;
  color: #fff;
  padding: 0 24px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-title {
  font-family: 'Segoe UI', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.header-sub {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.8rem;
  color: #a8c8ff;
}

/* ── 主容器 ── */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px 18px 8px;
}

/* ── 每列：2 個 group 並排 ── */
.group-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-bottom: 14px;
  border: 1px solid #c4c9d0;
  background: #fff;
}

/* ── 單個 group ── */
.group {
  padding: 8px 10px 10px;
}
.group + .group {
  border-left: 2px solid #c4c9d0;
}
.group-label {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 7px;
  padding-bottom: 5px;
  border-bottom: 1px solid #e5e7eb;
}

/* ── 4 欄格線 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

/* ── 卡片 ── */
.card {
  cursor: pointer;
  border: 1px solid #d1d5db;
  border-radius: 3px;
  padding: 5px 5px 6px;
  background: #f8f9fa;
  transition: border-color 0.15s;
}
.card:hover {
  border-color: #1a5fcf;
  background: #fff;
}
.card.active {
  border-color: #1a5fcf;
  background: #fff;
}

/* 名稱 */
.card-name {
  font-size: 0.68rem;
  color: #374151;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.2px;
}
.card:hover .card-name,
.card.active .card-name { color: #1a5fcf; }

/* 曲線 canvas */
.card canvas {
  width: 100%;
  aspect-ratio: 3 / 2;
  height: auto;
  display: block;
  background: #e4e8ed;
  border-radius: 2px;
}

/* 球軌道 */
.track-wrap {
  height: 16px;
  background: #e4e8ed;
  border-radius: 2px;
  margin-top: 4px;
  position: relative;
  overflow: hidden;
}
.track-line {
  position: absolute;
  top: 50%; left: 5px; right: 5px;
  height: 1px;
  background: #c4c9d0;
  transform: translateY(-50%);
}
.ball {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  background: #1a5fcf;
  top: 50%; left: 5px;
  transform: translateY(-50%);
}

/* ── Basic 區 (單獨半寬 + linear 說明) ── */
.basic-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-bottom: 14px;
  border: 1px solid #c4c9d0;
  background: #fff;
}
.linear-panel {
  padding: 10px 12px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  border-right: 2px solid #c4c9d0;
}
.linear-panel canvas {
  width: 90px;
  height: 90px;
  flex-shrink: 0;
  background: #e4e8ed;
  display: block;
  border-radius: 2px;
}
.linear-desc {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  color: #374151;
  line-height: 1.6;
  padding-top: 2px;
}
.linear-desc strong {
  font-size: 0.85rem;
  color: #1a1a1a;
  display: block;
  margin-bottom: 5px;
  font-family: 'Courier New', monospace;
}

/* ── 底部列 ── */
.bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 46px;
  background: #1e293b;
  border-top: 2px solid #1a5fcf;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  z-index: 99;
  transform: translateY(100%);
  transition: transform 0.2s;
}
.bar.show { transform: translateY(0); }
.bar-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: #93c5fd;
  min-width: 120px;
}
.bar-sep { width: 1px; height: 20px; background: #334155; }
.bar-code {
  flex: 1;
  font-size: 0.75rem;
  color: #64748b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-btn {
  padding: 5px 16px;
  border-radius: 4px;
  border: 1px solid #334155;
  background: transparent;
  color: #94a3b8;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  transition: all 0.15s;
  flex-shrink: 0;
}
.bar-btn:hover { border-color: #93c5fd; color: #93c5fd; }
.bar-btn.ok { border-color: #4ade80; color: #4ade80; }

/* ── RWD：平板 (≤ 768px) ── */
@media (max-width: 768px) {
  .header { height: auto; padding: 10px 16px; flex-wrap: wrap; gap: 4px; }
  .header-title { font-size: 1rem; }
  .header-sub { font-size: 0.72rem; width: 100%; }

  .page { padding: 12px 10px 6px; }

  /* 兩組改為上下排列 */
  .group-row { grid-template-columns: 1fr; }
  .group + .group { border-left: none; border-top: 2px solid #c4c9d0; }

  /* Basic 區上下排列 */
  .basic-row { grid-template-columns: 1fr; }
  .linear-panel { border-right: none; border-bottom: 2px solid #c4c9d0; }
}

/* ── RWD：手機 (≤ 520px) ── */
@media (max-width: 520px) {
  .header-sub { display: none; }

  /* 4 欄 → 2 欄 */
  .grid { grid-template-columns: repeat(2, 1fr); gap: 5px; }

  .card-name { font-size: 0.65rem; }

  /* linear 面板縮小 */
  .linear-panel { flex-direction: column; gap: 8px; }
  .linear-panel canvas { width: 100%; aspect-ratio: 1 / 1; height: auto; }
  .linear-desc { font-size: 0.72rem; }

  /* 底部列 */
  .bar { padding: 0 12px; gap: 8px; height: 44px; }
  .bar-name { font-size: 0.8rem; min-width: auto; }
  .bar-sep, .bar-code { display: none; }
  .bar-btn { padding: 5px 12px; font-size: 0.75rem; }
}

/* ── RWD：小手機 (≤ 360px) ── */
@media (max-width: 360px) {
  .grid { gap: 4px; }
  .card { padding: 4px 4px 5px; }
  .group { padding: 6px 7px 8px; }
  .group-row, .basic-row { margin-bottom: 10px; }
}

/* ══════════════════════════════
   應用示範區
══════════════════════════════ */
.demo-section {
  margin-bottom: 18px;
  border: 1px solid #c4c9d0;
  background: #fff;
  padding: 12px 12px 14px;
}
.demo-section-title {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e5e7eb;
}
.demo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.demo-card {
  border: 1px solid #d1d5db;
  border-radius: 4px;
  overflow: hidden;
  background: #f8f9fa;
  display: flex;
  flex-direction: column;
}
.demo-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 9px 6px;
  gap: 6px;
}
.demo-card-name {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: #1a1a1a;
}
.demo-easing-tag {
  font-family: 'Courier New', monospace;
  font-size: 0.63rem;
  background: #dbeafe;
  color: #1d4ed8;
  padding: 2px 7px;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.demo-easing-tag:hover { background: #bfdbfe; }
.demo-stage {
  flex: 1;
  min-height: 140px;
  background: #0f1729;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.demo-play {
  width: 100%;
  padding: 7px;
  background: #1a5fcf;
  color: #fff;
  border: none;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.3px;
}
.demo-play:hover { background: #1a4fb0; }
.demo-play.running { background: #334155; cursor: default; }

/* 示範元件樣式 */
.d-btn {
  background: linear-gradient(135deg, #1a5fcf, #3b82f6);
  color: #fff;
  padding: 9px 22px;
  border-radius: 8px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: 0 4px 14px rgba(26,95,207,0.5);
  user-select: none;
}
.d-dmg {
  font-family: 'Segoe UI Black', 'Arial Black', sans-serif;
  font-size: 1.9rem;
  font-weight: 900;
  color: #ff4757;
  text-shadow: 0 0 12px rgba(255,71,87,0.8);
  letter-spacing: -1px;
  position: absolute;
}
.d-dialog {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 10px 18px;
  text-align: center;
  min-width: 110px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}

@media (max-width: 900px) {
  .demo-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .demo-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 400px) {
  .demo-grid { grid-template-columns: 1fr; }
}

/* ── 應用說明卡 ── */
.info-card {
  background: #fff;
  border: 1px solid #c4c9d0;
  margin-bottom: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.info-col {
  padding: 12px 14px 14px;
}
.info-col + .info-col {
  border-left: 2px solid #c4c9d0;
}
.info-col-title {
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 9px;
  padding-bottom: 5px;
  border-bottom: 1px solid #e5e7eb;
}
.info-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.info-item {
  display: flex;
  align-items: baseline;
  gap: 7px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.75rem;
  line-height: 1.45;
}
.info-scene {
  color: #374151;
  white-space: nowrap;
  flex-shrink: 0;
}
.info-arrow {
  color: #9ca3af;
  font-size: 0.65rem;
  flex-shrink: 0;
}
.info-tag {
  font-family: 'Courier New', monospace;
  font-size: 0.67rem;
  padding: 1px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.info-type {
  display: flex;
  align-items: baseline;
  gap: 7px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.75rem;
  line-height: 1.45;
  margin-bottom: 4px;
}
.info-type-name {
  font-family: 'Courier New', monospace;
  font-size: 0.67rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
  min-width: 58px;
  text-align: center;
  flex-shrink: 0;
}
.info-type-desc {
  color: #4b5563;
  font-size: 0.72rem;
}
@media (max-width: 768px) {
  .info-card { grid-template-columns: 1fr; }
  .info-col + .info-col { border-left: none; border-top: 2px solid #c4c9d0; }
}

/* ── 分頁 ── */
.tab-bar {
  display: flex;
  background: #fff;
  border: 1px solid #c4c9d0;
  border-bottom: 2px solid #c4c9d0;
  border-radius: 4px 4px 0 0;
  overflow: hidden;
}
.tab-btn {
  padding: 12px 30px;
  border: none;
  background: transparent;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: #6b7280;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.tab-btn:hover { background: #f8f9fa; color: #374151; }
.tab-btn.active { color: #1a5fcf; border-bottom-color: #1a5fcf; background: #f0f5ff; }
.tab-panel { display: none; padding-top: 14px; }
.tab-panel.active { display: block; }

/* 老虎機元件 */
.slot-reel {
  position: relative;
  width: 42px; height: 96px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #334155;
  flex-shrink: 0;
}
.slot-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(#0f1729 0%,transparent 28%,transparent 72%,#0f1729 100%);
  z-index: 1; pointer-events: none;
}
.slot-line {
  position: absolute; left: 0; right: 0; height: 1px;
  background: #1e3a5f; z-index: 1;
}
.slot-cell {
  height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem;
  background: #0a1628;
}
.d-lever-arm {
  position: absolute;
  right: -11px; top: 50%;
  width: 8px; height: 28px;
  background: linear-gradient(135deg,#e2e8f0,#94a3b8);
  border-radius: 4px;
  transform-origin: top center;
  transform: rotate(0deg);
}
.d-lever-ball {
  position: absolute;
  bottom: -7px; left: 50%;
  transform: translateX(-50%);
  width: 13px; height: 13px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%,#f87171,#ef4444);
  box-shadow: 0 0 6px rgba(239,68,68,0.6);
}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Cocos Creator　Easing Cheat Sheet</span>
  <span class="header-sub">滑鼠移入自動播放 · 點擊複製名稱</span>
</div>

<div class="page">
  <div id="tab-sheet"></div>
  <div id="tab-demo" style="display:none"></div>
</div>

<div class="bar" id="bar">
  <div class="bar-name" id="barName">—</div>
  <div class="bar-sep"></div>
  <div class="bar-code" id="barCode"></div>
  <button class="bar-btn" id="barBtn" onclick="copyCode()">複製名稱</button>
</div>

<script>
const E = {
  linear:       t => t,
  smooth:       t => t*t*(3-2*t),
  fade:         t => t*t*t*(t*(t*6-15)+10),
  constant:     () => 0,
  quadIn:       t => t*t,
  quadOut:      t => t*(2-t),
  quadInOut:    t => t<.5?2*t*t:-1+(4-2*t)*t,
  quadOutIn:    t => t<.5?E.quadOut(t*2)/2:E.quadIn(t*2-1)/2+.5,
  cubicIn:      t => t*t*t,
  cubicOut:     t => { let u=t-1; return u*u*u+1; },
  cubicInOut:   t => t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1,
  cubicOutIn:   t => t<.5?E.cubicOut(t*2)/2:E.cubicIn(t*2-1)/2+.5,
  quartIn:      t => t*t*t*t,
  quartOut:     t => { let u=t-1; return 1-u*u*u*u; },
  quartInOut:   t => t<.5?8*t*t*t*t:1-8*(t-1)*(t-1)*(t-1)*(t-1),
  quartOutIn:   t => t<.5?E.quartOut(t*2)/2:E.quartIn(t*2-1)/2+.5,
  quintIn:      t => t*t*t*t*t,
  quintOut:     t => { let u=t-1; return u*u*u*u*u+1; },
  quintInOut:   t => t<.5?16*t*t*t*t*t:1+16*(t-1)*(t-1)*(t-1)*(t-1)*(t-1),
  quintOutIn:   t => t<.5?E.quintOut(t*2)/2:E.quintIn(t*2-1)/2+.5,
  sineIn:       t => 1-Math.cos(t*Math.PI/2),
  sineOut:      t => Math.sin(t*Math.PI/2),
  sineInOut:    t => -(Math.cos(Math.PI*t)-1)/2,
  sineOutIn:    t => t<.5?E.sineOut(t*2)/2:E.sineIn(t*2-1)/2+.5,
  expoIn:       t => t===0?0:Math.pow(2,10*t-10),
  expoOut:      t => t===1?1:1-Math.pow(2,-10*t),
  expoInOut:    t => t===0?0:t===1?1:t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2,
  expoOutIn:    t => t<.5?E.expoOut(t*2)/2:E.expoIn(t*2-1)/2+.5,
  circIn:       t => 1-Math.sqrt(1-t*t),
  circOut:      t => Math.sqrt(1-(t-1)*(t-1)),
  circInOut:    t => t<.5?(1-Math.sqrt(1-4*t*t))/2:(Math.sqrt(1-(t*2-2)*(t*2-2))+1)/2,
  circOutIn:    t => t<.5?E.circOut(t*2)/2:E.circIn(t*2-1)/2+.5,
  elasticIn:    t => t===0||t===1?t:-Math.pow(2,10*t-10)*Math.sin((t*10-10.75)*(2*Math.PI)/3),
  elasticOut:   t => t===0||t===1?t:Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI)/3)+1,
  elasticInOut: t => { if(!t||t===1)return t; return t<.5?-(Math.pow(2,20*t-10)*Math.sin((20*t-11.125)*(2*Math.PI)/4.5))/2:(Math.pow(2,-20*t+10)*Math.sin((20*t-11.125)*(2*Math.PI)/4.5))/2+1; },
  elasticOutIn: t => t<.5?E.elasticOut(t*2)/2:E.elasticIn(t*2-1)/2+.5,
  backIn:       t => { const c=1.70158; return t*t*((c+1)*t-c); },
  backOut:      t => { const c=1.70158,u=t-1; return 1+u*u*((c+1)*u+c); },
  backInOut:    t => { const c1=1.70158,c2=c1*1.525; return t<.5?(Math.pow(2*t,2)*((c2+1)*2*t-c2))/2:(Math.pow(2*t-2,2)*((c2+1)*(t*2-2)+c2)+2)/2; },
  backOutIn:    t => t<.5?E.backOut(t*2)/2:E.backIn(t*2-1)/2+.5,
  bounceOut:    t => { if(t<1/2.75)return 7.5625*t*t; if(t<2/2.75){t-=1.5/2.75;return 7.5625*t*t+.75;} if(t<2.5/2.75){t-=2.25/2.75;return 7.5625*t*t+.9375;} t-=2.625/2.75;return 7.5625*t*t+.984375; },
  bounceIn:     t => 1-E.bounceOut(1-t),
  bounceInOut:  t => t<.5?E.bounceIn(t*2)/2:E.bounceOut(t*2-1)/2+.5,
  bounceOutIn:  t => t<.5?E.bounceOut(t*2)/2:E.bounceIn(t*2-1)/2+.5,
};

// 成對的分類：每列 2 組 × 4 個 = 8 個
const Pairs = [
  [ { label:'Sine',    keys:['sineIn','sineOut','sineInOut','sineOutIn'] },
    { label:'Quad',    keys:['quadIn','quadOut','quadInOut','quadOutIn'] } ],
  [ { label:'Cubic',   keys:['cubicIn','cubicOut','cubicInOut','cubicOutIn'] },
    { label:'Quart',   keys:['quartIn','quartOut','quartInOut','quartOutIn'] } ],
  [ { label:'Quint',   keys:['quintIn','quintOut','quintInOut','quintOutIn'] },
    { label:'Expo',    keys:['expoIn','expoOut','expoInOut','expoOutIn'] } ],
  [ { label:'Circ',    keys:['circIn','circOut','circInOut','circOutIn'] },
    { label:'Elastic', keys:['elasticIn','elasticOut','elasticInOut','elasticOutIn'] } ],
  [ { label:'Back',    keys:['backIn','backOut','backInOut','backOutIn'] },
    { label:'Bounce',  keys:['bounceIn','bounceOut','bounceInOut','bounceOutIn'] } ],
];

const BasicGroup = { label:'Basic', keys:['smooth','fade','constant'] };

// 曲線顏色
const CURVE_COLOR = '#1a5fcf';
const GRID_COLOR  = '#c8cdd4';
const REF_COLOR   = '#bfc5cc';
const BG_COLOR    = '#e4e8ed';

function drawCurve(cvs, name, size) {
  const fn = E[name];
  const dpr = devicePixelRatio || 1;
  const W = size || cvs.clientWidth || 140;
  const H = size || cvs.clientHeight || Math.round(W * 2/3);
  cvs.width  = W * dpr;
  cvs.height = H * dpr;
  const ctx = cvs.getContext('2d');
  ctx.scale(dpr, dpr);
  const p = 7;

  // bg
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = GRID_COLOR; ctx.lineWidth = 0.5;
  for (let i=1;i<4;i++) {
    const x=p+(W-p*2)*i/4, y=p+(H-p*2)*i/4;
    ctx.beginPath(); ctx.moveTo(x,p); ctx.lineTo(x,H-p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p,y); ctx.lineTo(W-p,y); ctx.stroke();
  }
  // border
  ctx.strokeStyle = '#b8bfc8'; ctx.lineWidth = 0.8;
  ctx.strokeRect(p, p, W-p*2, H-p*2);

  // diagonal ref
  ctx.strokeStyle = REF_COLOR; ctx.lineWidth = 0.8;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(p,H-p); ctx.lineTo(W-p,p); ctx.stroke();
  ctx.setLineDash([]);

  // curve
  ctx.strokeStyle = CURVE_COLOR; ctx.lineWidth = 1.8;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i=0;i<=100;i++) {
    const t=i/100, v=fn(t);
    const x=p+t*(W-p*2), y=H-p-v*(H-p*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

// RAF 管理
const rafMap={}, hoverSet=new Set();
const GroupEls={};
let currentName='';

function playCard(name, ball, trackEl) {
  if (rafMap[name]) cancelAnimationFrame(rafMap[name]);
  const fn = E[name];
  const maxX = trackEl.clientWidth - 10 - 5;
  const dur = 900;
  const t0 = performance.now();
  function step(now) {
    const t = Math.min((now-t0)/dur, 1);
    ball.style.left = (5 + fn(t)*maxX) + 'px';
    if (t<1) { rafMap[name]=requestAnimationFrame(step); }
    else if (hoverSet.has(name)) { playCard(name,ball,trackEl); }
    else { rafMap[name]=null; }
  }
  rafMap[name]=requestAnimationFrame(step);
}

function stopCard(name, ball) {
  if (rafMap[name]) { cancelAnimationFrame(rafMap[name]); rafMap[name]=null; }
  ball.style.left='5px';
}

const bar=document.getElementById('bar');
const barName=document.getElementById('barName');
const barCode=document.getElementById('barCode');

function copyCode() {
  if (!currentName) return;
  navigator.clipboard.writeText(currentName).then(()=>{
    const b=document.getElementById('barBtn');
    b.textContent='✓ 已複製'; b.classList.add('ok');
    setTimeout(()=>{ b.textContent='複製名稱'; b.classList.remove('ok'); },2000);
  });
}

function makeCard(name, container) {
  const card=document.createElement('div'); card.className='card';
  const lbl=document.createElement('div'); lbl.className='card-name'; lbl.textContent=name;
  const cvs=document.createElement('canvas');
  const tw=document.createElement('div'); tw.className='track-wrap';
  const tl=document.createElement('div'); tl.className='track-line';
  const ball=document.createElement('div'); ball.className='ball';
  tw.append(tl,ball);
  card.append(lbl,cvs,tw);
  container.appendChild(card);

  requestAnimationFrame(()=>drawCurve(cvs,name));

  function onEnter() {
    card.classList.add('active'); hoverSet.add(name);
    currentName=name; bar.classList.add('show');
    barName.textContent=name;
    barCode.textContent=`easing: "${name}"`;
    playCard(name,ball,tw);
  }
  function onLeave() {
    card.classList.remove('active'); hoverSet.delete(name); stopCard(name,ball);
  }
  card.addEventListener('mouseenter', onEnter);
  card.addEventListener('mouseleave', onLeave);
  // 觸控支援
  card.addEventListener('touchstart', e => { e.preventDefault(); onEnter(); }, { passive: false });
  card.addEventListener('touchend', () => { onLeave(); copyCode(); });
  card.addEventListener('click', () => copyCode());
}

function makeGroup(g, container) {
  const wrap=document.createElement('div'); wrap.className='group';
  const lbl=document.createElement('div'); lbl.className='group-label'; lbl.textContent=g.label;
  const grid=document.createElement('div'); grid.className='grid';
  wrap.append(lbl,grid);
  container.appendChild(wrap);
  g.keys.forEach(name=>makeCard(name,grid));
  GroupEls[g.label]=wrap;
}

function mk(tag, cls, txt) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (txt !== undefined) el.textContent = txt;
  return el;
}

function runAnim(ms, easingName, onUpdate, onDone) {
  const fn = E[easingName];
  const t0 = performance.now();
  (function tick(now) {
    const t = Math.min((now - t0) / ms, 1);
    onUpdate(fn(t));
    if (t < 1) requestAnimationFrame(tick);
    else if (onDone) onDone();
  })(performance.now());
}

      sceneA.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Segoe UI;font-size:0.8rem;color:#64748b;letter-spacing:1px;background:#0f1729;';
      sceneA.textContent = '場景 A';
      const sceneB = mk('div');
      sceneB.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Segoe UI;font-size:0.8rem;color:#64748b;letter-spacing:1px;background:#0a2010;opacity:0;';
      sceneB.textContent = '場景 B';
      const overlay = mk('div');
      overlay.style.cssText = 'position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;';
      stage.append(sceneA, sceneB, overlay);
      return { overlay, sceneA, sceneB };
    },
    play({ overlay, sceneA, sceneB }, stage, done) {
      overlay.style.opacity = '0'; sceneA.style.opacity = '1'; sceneB.style.opacity = '0';
      runAnim(500, 'smooth', v => {
        overlay.style.opacity = String(v);
      }, () => {
        sceneA.style.opacity = '0'; sceneB.style.opacity = '1';
        runAnim(500, 'smooth', v => {
          overlay.style.opacity = String(1 - v);
        }, done);
      });
    }
  },
];

function buildDemoCard(d, autoPlayDelay) {
  const card = mk('div', 'demo-card');
  const hdr = mk('div', 'demo-card-header');
  const nameEl = mk('span', 'demo-card-name', d.name);
  const tag = mk('span', 'demo-easing-tag', d.easing);
  tag.title = '點擊複製 easing 名稱';
  tag.onclick = () => {
    navigator.clipboard.writeText(d.easing);
    tag.textContent = '✓ 複製';
    setTimeout(() => { tag.textContent = d.easing; }, 1500);
  };
  hdr.append(nameEl, tag);
  const stage = mk('div', 'demo-stage');
  const playBtn = mk('button', 'demo-play', '▶ 播放');
  card.append(hdr, stage, playBtn);
  const el = d.build(stage);
  let running = false;
  function triggerPlay() {
    if (running) return;
    running = true;
    playBtn.textContent = '⏸ 播放中';
    playBtn.classList.add('running');
    d.play(el, stage, () => {
      running = false;
      playBtn.textContent = '▶ 播放';
      playBtn.classList.remove('running');
    });
  }
  playBtn.onclick = triggerPlay;
  if (autoPlayDelay != null) setTimeout(triggerPlay, autoPlayDelay);
  return card;
}

function buildDemos() {
  const divider = mk('div');
  divider.style.cssText = 'height:2px;background:linear-gradient(90deg,#1a5fcf,#3b82f6,transparent);margin-bottom:18px;border-radius:1px;';
  tabSheet.appendChild(divider);
  const section = mk('div', 'demo-section');
  const title = mk('div', 'demo-section-title', '🎮 應用示範 — Application Demo');
  const grid = mk('div', 'demo-grid');
  DemoList.forEach((d, i) => grid.appendChild(buildDemoCard(d, 400 + i * 180)));
  section.append(title, grid);
  tabSheet.appendChild(section);
}

buildDemos();

// 在各分類下嵌入對應示範
const GroupDemos = {
  'Basic':   ['過場轉場'],
  'Sine':    ['傷害浮字', '場景淡出'],
  'Quad':    ['分數累加'],
  'Cubic':   ['背包面板', '選單展開'],
  'Quart':   ['鏡頭縮放'],
  'Quint':   ['角色位移'],
  'Expo':    ['血條回復', '滾輪停格'],
  'Circ':    ['清單捲動'],
  'Elastic': ['道具彈入', 'COMBO 爆字'],
  'Back':    ['按鈕回彈', '對話框開啟'],
  'Bounce':  ['角色跳躍', '彈跳球'],
};

Object.entries(GroupDemos).forEach(([label, names]) => {
  const groupEl = GroupEls[label];
  if (!groupEl) return;
  const matched = names.map(n => DemoList.find(d => d.name === n)).filter(Boolean);
  if (!matched.length) return;
  const sep = mk('div');
  sep.style.cssText = 'height:1px;background:#e5e7eb;margin:8px 0 7px;';
  const row = mk('div');
  row.style.cssText = `display:grid;grid-template-columns:repeat(${Math.min(matched.length, 2)},1fr);gap:6px;`;
  matched.forEach(d => row.appendChild(buildDemoCard(d, null)));
  groupEl.append(sep, row);
});

window.addEventListener('resize',()=>{

  document.querySelectorAll('.card canvas').forEach(cvs=>{
    const name=cvs.closest('.card').querySelector('.card-name').textContent;
    if(name && E[name]) drawCurve(cvs,name);
  });
  // linear
  const lc=document.querySelector('.linear-panel canvas');
  if(lc) drawCurve(lc,'linear',90);
});
