<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blu工具庫</title>

  <style>
	body {
	  margin: 0;
	  font-family: "Microsoft JhengHei", Arial, sans-serif;
	  background: #191919;
	  color: #fff;
	}

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 36px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }

	.section {
	  background: linear-gradient(180deg, #465266, #374154);
	  border-radius: 24px;
	  padding: 28px 18px 18px;
	  margin-bottom: 26px;
	  box-shadow:
		0 18px 36px rgba(0, 0, 0, 0.45),
		inset 0 1px 0 rgba(255, 255, 255, 0.12);
	  border: 1px solid rgba(255, 255, 255, 0.10);
	  max-width: 900px;
	  margin-left: auto;
	  margin-right: auto;
	}

	.section-title {
	  background: none;
	  color: #ffffff;
	  text-align: center;
	  padding: 0;
	  border-radius: 0;
	  font-size: 24px;
	  font-weight: bold;
	  margin-bottom: 22px;
	  text-shadow: 0 2px 6px rgba(0,0,0,0.35);
	}

	.button-grid {
	  display: grid;
	  grid-template-columns: repeat(4, 1fr);
	  gap: 14px;
	}

	.link-button {
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  justify-content: center;

	  width: 100%;
	  aspect-ratio: 1 / 1;
	  border-radius: 18px;

	  background: rgba(130, 145, 175, 0.35);
	  color: #ffffff;
	  text-decoration: none;
	  font-size: 15px;
	  font-weight: bold;

	  box-shadow:
		inset 0 1px 0 rgba(255,255,255,0.25),
		0 8px 18px rgba(0,0,0,0.25);

	  transition: 0.2s;
	}
	
	.button-icon {
	  width: 110px;
	  height: 110px;
	  object-fit: contain;
	  margin-bottom: 14px;
	  border-radius: 22px;
	}
	
	.link-button:hover {
	  transform: translateY(-4px) scale(1.03);
	  background: rgba(255, 255, 255, 0.22);
	  box-shadow:
		inset 0 1px 0 rgba(255,255,255,0.35),
		0 12px 24px rgba(0,0,0,0.35);
	}

    .note {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Blu工具庫</h1>

    <div class="section">
      <div class="section-title">公司運作</div>
      <div class="button-grid">
        <a class="link-button" href="https://dinbendon.net/do/" target="_blank">🍗 訂便當系統</a>
        <a class="link-button" href="https://portal.nueip.com/login/iwct" target="_blank">👤 Nueip HR系統</a>
		<a class="link-button" href="https://www.ccglab.net/login" target="_blank">⭐RS Lab</a>
		<a class="link-button" href="https://lab.gdg168.com/login" target="_blank">⭐FC Lab</a>

      </div>
    </div>

       <div class="section">
      <div class="section-title">網站連結</div>
      <div class="button-grid">
	  
	  <a class="link-button" href="https://drive.google.com" target="_blank">
		  <img class="button-icon" src="./assets/icons/drive.png" alt="Google Drive">
		  <span>Google Drive</span>
		</a>
		
	  <a class="link-button" href="https://www.notion.so/" target="_blank">
		  <img class="button-icon" src="./assets/icons/Notion.png" alt="Notion">
		  <span>Notion</span>
		</a>
        
	  <a class="link-button" href="https://github.com" target="_blank">
		  <img class="button-icon" src="./assets/icons/GitHub.png" alt="GitHub">
		  <span>GitHub</span>
		</a>
		
	  <a class="link-button" href="https://chat.openai.com" target="_blank">
		  <img class="button-icon" src="./assets/icons/chatgpt.png" alt="ChatGPT">
		  <span>ChatGPT</span>
		</a>
		
	  <a class="link-button" href="https://chat.openai.com" target="_blank">
		  <img class="button-icon" src="./assets/icons/Gemini.png" alt="Gemini">
		  <span>Gemini</span>
		</a>
		
	  <a class="link-button" href="https://claude.ai/new" target="_blank">
		  <img class="button-icon" src="./assets/icons/Claude.png" alt="Claude">
		  <span>Claude</span>
		</a>
		
      </div>
    </div>

    <div class="section">
      <div class="section-title">小工具</div>
      <div class="button-grid">
	  
	  <a class="link-button" href="./tools/spineviewer/" target="_blank">
		  <img class="button-icon" src="./assets/icons/spine-viewer.png" alt="SpineViewer">
		  <span>SpineViewer</span>
		</a>
		
      </div>
    </div>
    <div class="section">
      <div class="section-title">工具下載區</div>
      <div class="button-grid">
	  
	    <a class="link-button" href="./tools/downloads/spineExport_v2.0.zip" download>
		  <img class="button-icon" src="./assets/icons/spine-export.png" alt="Spine Export">
		  <span>Spine Export</span>
		</a>
		
		<a class="link-button" href="./tools/downloads/spine-recover_v6.zip" download>
		  <img class="button-icon" src="./assets/icons/spine-recover.png" alt="Spine Recover">
		  <span>Spine Recover</span>
		</a>
		
		<a class="link-button" href="./tools/downloads/FontTool.zip" download>
		  <img class="button-icon" src="./assets/icons/fonttool.png" alt="FontTool">
		  <span>FontTool</span>
		</a>
		
      </div>
    </div>
  </div>
</body>
</html>
